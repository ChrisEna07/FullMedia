name: full_media
description: "FullMedia by ChrizDev - Potente reproductor multimedia híbrido."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2

  
  # --- Audio y Video ---
  just_audio: ^0.9.36
  video_player: ^2.8.2
  chewie: ^1.8.1
  audio_video_progress_bar: ^2.0.1
  
  # --- Ecualizador y Audio Effects ---
  equalizer_flutter: ^0.0.1
  
  # --- Manejo de archivos y permisos ---
  dio: ^5.4.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  file_picker: ^8.0.0
  
  # --- Herramientas y Red ---
  youtube_explode_dart: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# --- Configuración del Icono de la App ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/FMCD.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/FMCD.png"
  windows:
    generate: true
    image_path: "assets/icon/FMCD.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
    - assets/icon/FMCD.png